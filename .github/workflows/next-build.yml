name: Next.js build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma config requires a URL to generate the client; the build does not
      # connect to MongoDB, so CI can use a local placeholder value.
      DATABASE_URL: mongodb://127.0.0.1:27017/coach_progress

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build
